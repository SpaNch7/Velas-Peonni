# =====================================================
# Configuração do Banco de Dados - Peonni
# =====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/peonni
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# JPA / Hibernate
# IMPORTANTE: com Flyway, ddl-auto deve ser 'validate' ou 'none'
# O Flyway é quem gerencia a criação das tabelas agora
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# Flyway
# =====================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
